<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rafaela — Consultoria de Treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6F0;
    --card:#FFFFFF;
    --card-border:#EFE3D6;
    --rose:#D89AA0;
    --rose-deep:#BE7B84;
    --rose-pale:#F4E1E1;
    --gold:#B8935A;
    --gold-deep:#8F6E3E;
    --gold-pale:#EFDDB6;
    --ink:#3A322B;
    --ink-soft:#8C8076;
    --ink-faint:#C7BBAE;
    --line:#EFE3D6;
    --shadow: 0 8px 24px -8px rgba(58,50,43,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
    padding-bottom:86px;
  }
  /* Top bar */
  .topbar{
    padding:22px 20px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #FDFAF6 0%, var(--bg) 100%);
  }
  .topbar .brand{
    display:flex; flex-direction:column; gap:2px;
  }
  .topbar .brand .eyebrow{
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold-deep); font-weight:600;
  }
  .topbar .brand h1{
    font-size:22px; font-weight:600; margin:0; color:var(--ink);
  }
  .topbar .pill{
    font-size:11px; font-weight:600; color:var(--rose-deep);
    background:var(--rose-pale); padding:5px 10px; border-radius:20px;
    white-space:nowrap;
  }

  main{ flex:1; padding:16px 18px 24px; }

  /* Tip banner */
  .tip{
    display:flex; gap:12px; align-items:flex-start;
    background:linear-gradient(135deg, #FFFDF9 0%, var(--gold-pale) 140%);
    border:1px solid var(--gold-pale);
    border-radius:16px;
    padding:14px 14px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .tip .icon{
    flex:0 0 auto; width:30px;height:30px;border-radius:50%;
    background:var(--gold); display:flex;align-items:center;justify-content:center;
    color:#fff; font-size:15px; margin-top:1px;
  }
  .tip .body{flex:1;}
  .tip .body .label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-bottom:2px;}
  .tip .body p{margin:0;font-size:13px;line-height:1.5;color:var(--ink);}

  /* Cards */
  .card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:18px;
    padding:16px 16px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .card h2{font-size:17px;margin:0 0 4px;font-weight:600;}
  .card .sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;}
  .section-title{
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:700;margin:20px 2px 10px;
  }
  .section-title:first-child{margin-top:0;}

  /* Week ring */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 0 4px;}
  .ring-svg{width:186px;height:186px;}
  .ring-center-num{font-family:'Fraunces',serif;font-size:34px;font-weight:600;fill:var(--ink);}
  .ring-center-label{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.1em;fill:var(--ink-soft);text-transform:uppercase;}
  .petal{cursor:pointer;transition:opacity .15s;}
  .petal:hover{opacity:.85;}
  .week-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;margin:0 -2px;-webkit-overflow-scrolling:touch;}
  .week-chip{
    flex:0 0 auto; min-width:44px; text-align:center; padding:8px 4px;
    border-radius:12px; font-size:12.5px; font-weight:600; color:var(--ink-soft);
    background:#FBF8F3; border:1px solid var(--line); cursor:pointer;
  }
  .week-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .week-chip .rpe{display:block;font-size:9px;font-weight:500;opacity:.7;margin-top:2px;}

  /* Workout tabs A B C */
  .subtabs{display:flex;gap:6px;margin-bottom:14px;}
  .subtab{
    flex:1;text-align:center;padding:9px 0;border-radius:12px;font-size:13px;font-weight:600;
    background:#FBF8F3;color:var(--ink-soft);border:1px solid var(--line);cursor:pointer;
  }
  .subtab.active{background:var(--rose);color:#fff;border-color:var(--rose);}

  .exercise{
    border-bottom:1px solid var(--line);
    padding:13px 0;
  }
  .exercise:last-child{border-bottom:none;padding-bottom:2px;}
  .exercise-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .exercise-name{font-size:14.5px;font-weight:600;color:var(--ink);}
  .exercise-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .check-btn{
    flex:0 0 auto; width:28px;height:28px;border-radius:50%;
    border:1.5px solid var(--ink-faint); background:#fff;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-size:14px;color:transparent;transition:all .15s;
  }
  .check-btn.done{background:var(--gold);border-color:var(--gold);color:#fff;}
  .exercise-controls{display:flex;gap:8px;margin-top:9px;}
  .field{flex:1;}
  .field label{display:block;font-size:10px;color:var(--ink-soft);margin-bottom:3px;letter-spacing:.03em;}
  .field input{
    width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 9px;
    font-size:13.5px;font-family:'Inter',sans-serif;color:var(--ink);background:#FBF8F3;
    font-variant-numeric:tabular-nums;
  }
  .field input:focus{outline:none;border-color:var(--rose);background:#fff;}
  .cardio-row{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--rose-pale);border-radius:12px;padding:11px 13px;margin-top:6px;
  }
  .cardio-row .l{font-size:13px;font-weight:600;color:var(--rose-deep);}
  .cardio-row .r{font-size:11.5px;color:var(--rose-deep);opacity:.85;}

  .progress-summary{display:flex;gap:10px;margin-top:2px;}
  .psum{flex:1;background:#FBF8F3;border-radius:12px;padding:10px;text-align:center;border:1px solid var(--line);}
  .psum .num{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--gold-deep);}
  .psum .lbl{font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}

  /* Guia */
  .search-box{
    display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:9px 12px;margin-bottom:14px;
  }
  .search-box input{border:none;outline:none;flex:1;font-size:14px;font-family:'Inter',sans-serif;background:transparent;}
  .guia-item{border-bottom:1px solid var(--line);padding:13px 0;}
  .guia-item:last-child{border-bottom:none;}
  .guia-item h3{font-size:14.5px;margin:0 0 6px;font-weight:600;}
  .guia-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
  .guia-tag{
    flex:0 0 auto;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 7px;border-radius:6px;margin-top:1px;white-space:nowrap;
  }
  .tag-como{background:#EAF1EC;color:#4E7A5B;}
  .tag-erro{background:#F6E4E1;color:#B25C4E;}
  .tag-dica{background:var(--gold-pale);color:var(--gold-deep);}
  .guia-row p{margin:0;font-size:12.8px;line-height:1.45;color:var(--ink);}

  /* Bem-estar */
  .list-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--line);gap:10px;
  }
  .list-item:last-child{border-bottom:none;}
  .list-item .name{font-size:13.5px;color:var(--ink);font-weight:500;}
  .list-item .time{font-size:12px;color:var(--ink-soft);white-space:nowrap;}
  .habit-check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .habit-check:last-child{border-bottom:none;}
  .habit-check .box{
    width:22px;height:22px;border-radius:7px;border:1.5px solid var(--ink-faint);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;color:transparent;font-size:12px;
  }
  .habit-check .box.done{background:var(--rose);border-color:var(--rose);color:#fff;}
  .habit-check .txt{font-size:13.5px;flex:1;}

  /* Avaliação */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .grid2 .field input{background:#FBF8F3;}
  .btn{
    width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;
  }
  .btn-primary{background:var(--ink);color:#fff;margin-top:12px;}
  .btn-primary:active{opacity:.85;}
  .rating-row{margin-bottom:12px;}
  .rating-row .rlabel{font-size:13px;color:var(--ink);margin-bottom:6px;display:block;font-weight:500;}
  .stars{display:flex;gap:6px;}
  .star{
    flex:1;text-align:center;padding:8px 0;border-radius:9px;background:#FBF8F3;
    border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;
  }
  .star.active{background:var(--rose);color:#fff;border-color:var(--rose);}
  textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:13.5px;
    font-family:'Inter',sans-serif;color:var(--ink);background:#FBF8F3;resize:vertical;min-height:44px;
  }
  textarea:focus{outline:none;border-color:var(--rose);background:#fff;}
  .qa{margin-bottom:11px;}
  .qa label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;}
  .history-entry{
    border-left:2px solid var(--gold-pale); padding:4px 0 4px 12px; margin-bottom:12px;
  }
  .history-entry .hdate{font-size:11px;color:var(--gold-deep);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;}
  .history-entry .hgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;color:var(--ink-soft);}
  .history-entry .hgrid b{color:var(--ink);display:block;font-size:13.5px;}
  .empty{text-align:center;padding:30px 10px;color:var(--ink-soft);font-size:13px;}

  /* Perfil */
  .profile-avatar{
    width:72px;height:72px;border-radius:50%;margin:6px auto 14px;
    background:linear-gradient(135deg, var(--rose) 0%, var(--gold) 100%);
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;
    font-size:28px;font-weight:600;
  }
  .field-full{margin-bottom:12px;}
  .field-full label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase;font-weight:600;}
  .field-full input, .field-full textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:14px;
    font-family:'Inter',sans-serif;color:var(--ink);background:#FBF8F3;
  }
  .field-full input:focus, .field-full textarea:focus{outline:none;border-color:var(--rose);background:#fff;}
  .save-note{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:8px;}
  .save-note.show{color:var(--gold-deep);font-weight:600;}

  /* Bottom nav */
  nav.bottomnav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:#FFFDF9;border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:8px 4px 12px;
    box-shadow:0 -6px 20px -10px rgba(58,50,43,0.15);
  }
  .navbtn{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink-faint);background:none;border:none;font-family:'Inter',sans-serif;
    font-size:10px;font-weight:600;cursor:pointer;padding:4px 8px;flex:1;
  }
  .navbtn.active{color:var(--rose-deep);}
  .navbtn svg{width:20px;height:20px;}

  .loading{display:flex;justify-content:center;padding:40px;color:var(--ink-soft);font-size:13px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <span class="eyebrow">Consultoria de treino</span>
      <h1 id="brandName">Rafaela</h1>
    </div>
    <div class="pill" id="weekPill">Semana 1/12</div>
  </div>
  <main id="main"><div class="loading">Carregando…</div></main>
  <nav class="bottomnav">
    <button class="navbtn" data-tab="treino">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12h2M18 12h2M6 8v8M18 8v8M8 12h8" stroke-linecap="round"/></svg>
      Treino
    </button>
    <button class="navbtn" data-tab="guia">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 4h9a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4Z" stroke-linejoin="round"/><path d="M8 8h6M8 11h6"/></svg>
      Guia
    </button>
    <button class="navbtn" data-tab="bemestar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21c-4-3-7-6.5-7-10.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 7 3.5C19 14.5 16 18 12 21Z" stroke-linejoin="round"/></svg>
      Bem-estar
    </button>
    <button class="navbtn" data-tab="avaliacao">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V10M11 19V5M18 19v-7" stroke-linecap="round"/></svg>
      Avaliação
    </button>
    <button class="navbtn" data-tab="perfil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4"/><path d="M5.5 20c1-3.6 4-5.5 6.5-5.5s5.5 1.9 6.5 5.5" stroke-linecap="round"/></svg>
      Perfil
    </button>
  </nav>
</div>

<script>
/* ============ DATA MODEL ============ */
const TOTAL_WEEKS = 12;

const WORKOUTS = {
  A: [
    {id:'legpress', nome:'Leg Press', series:3, reps:'10–12', foco:'Quadríceps e glúteos'},
    {id:'goblet', nome:'Agachamento Goblet', series:3, reps:'10–12', foco:'Força funcional e estabilidade'},

    {id:'abdutora', nome:'Abdutora', series:2, reps:'15', foco:'Glúteo médio'},

  ],

    {id:'legpressuni', nome:'Leg Press Unilateral', series:3, reps:'10–12', foco:'Força unilateral'},
    {id:'elevpelvica', nome:'Elevação Pélvica', series:3, reps:'10–12', foco:'Glúteos'},
    {id:'remadaC', nome:'Remada Máquina', series:2, reps:'10–12', foco:'Postura'},
    {id:'crucifixo', nome:'Crucifixo Inverso Máquina', series:2, reps:'12–15', foco:'Ombros posteriores e postura'},
    {id:'tricepscorda', nome:'Tríceps Corda', series:2, reps:'12–15', foco:'Tríceps'},
    {id:'farmerwalk', nome:'Farmer Walk', series:2, reps:'30–45 segundos', foco:'Core e estabilidade'},

const CARDIO = {tempo:'30 min', zona:'Zona 2 · Moderada (consegue conversar)'};

function rpeForWeek(w){
  if(w<=2) return '5–6';
  if(w<=4) return '6–7';
  return '6–7 (reavaliar carga)';
}

const GUIA = [
  {nome:'Leg Press', como:'Empurre a plataforma pelos calcanhares sem travar os joelhos.', erro:'Levantar o quadril do banco.', dica:'Controle a descida.'},
  {nome:'Agachamento Goblet', como:'Halter junto ao peito, desça até onde conseguir mantendo a coluna neutra.', erro:'Inclinar muito o tronco.', dica:'Pense em sentar para trás.'},
  {nome:'Cadeira Flexora', como:'Flexione os joelhos lentamente e retorne controlando.', erro:'Dar impulso.', dica:'Movimento contínuo.'},

  {nome:'Abdutora', como:'Empurre os joelhos para fora sem movimentar o tronco.', erro:'Soltar o peso rapidamente.', dica:'Faça pausa de 1 segundo na abertura.'},
  {nome:'Dead Bug', como:'Mantenha a lombar apoiada no chão enquanto alterna braço e perna.', erro:'Arquear a lombar.', dica:'Expire durante o movimento.'},
  {nome:'Puxada Aberta', como:'Puxe a barra até a parte superior do peito.', erro:'Puxar atrás da cabeça.', dica:'Feche as escápulas antes de puxar.'},

  {nome:'Supino Máquina', como:'Empurre sem travar os cotovelos.', erro:'Tirar os ombros do banco.', dica:'Controle a volta.'},
  {nome:'Desenvolvimento Máquina', como:'Empurre acima da cabeça sem elevar os ombros.', erro:'Arquear a lombar.', dica:'Abdômen firme.'},
  {nome:'Rosca Martelo', como:'Flexione os cotovelos mantendo os punhos neutros.', erro:'Balançar o corpo.', dica:'Cotovelos próximos ao tronco.'},

  {nome:'Farmer Walk', como:'Caminhe segurando os halteres com postura alta.', erro:'Inclinar o tronco.', dica:'Olhe para frente e mantenha o abdômen firme.'},
];

const HABITOS = [
  {id:'h1', nome:'Caminhar com o bebê', tempo:'10–20 min (dias sem treino)'},
  {id:'h2', nome:'Beber água', tempo:'Ao longo do dia'},
  {id:'h3', nome:'Levantar-se e movimentar-se', tempo:'A cada 60–90 min'},
  {id:'h4', nome:'Fazer a rotina de mobilidade', tempo:'Todos os dias'},
];
const FAMILIA = [
  {nome:'Caminhada com carrinho', tempo:'10–20 min'},
  {nome:'Alongamentos enquanto o bebê brinca', tempo:'5 min'},
  {nome:'Respiração profunda ao lado do bebê', tempo:'2 min'},
  {nome:'Brincadeiras no chão com mudanças de posição', tempo:'5–10 min'},
];

const RATING_ITEMS = [
  {id:'energia', label:'Energia'},
  {id:'sono', label:'Qualidade do sono'},
  {id:'doresPernas', label:'Dores nas pernas'},
  {id:'facilidadeBebe', label:'Facilidade para cuidar do bebê'},
  {id:'disposicao', label:'Disposição'},
  {id:'motivacao', label:'Motivação'},
  {id:'cardio', label:'Cardio'},
  {id:'musculacao', label:'Musculação'},
];
const CHECKIN_QUESTIONS = [
  {id:'q1', label:'Quantos treinos realizou?'},
  {id:'q2', label:'Fez a rotina de mobilidade?'},
  {id:'q3', label:'Fez os cardios?'},
  {id:'q4', label:'Como foi sua alimentação?'},

  {id:'q7', label:'O que foi mais fácil esta semana?'},
  {id:'q8', label:'O que foi mais difícil?'},
];

const TIPS = [
  "Você está em uso contínuo de rivaroxabana: evite exercícios de alto impacto, quedas ou pancadas fortes, e observe hematomas incomuns. Combine sempre a rotina com seu médico.",
  "Início de tirzepatida pode reduzir o apetite e a energia em alguns dias — priorize proteína e hidratação antes do treino.",
  "RPE é o quanto o esforço pesa pra você, de 0 a 10. Nas semanas 1–2, mantenha entre 5–6: deve ser desafiador, nunca no limite.",
  "Progrida carga só quando executar todos os exercícios do treino com técnica e facilidade — técnica sempre antes de peso.",
  "Descanse 75–90 segundos entre séries. É parte do treino, não tempo perdido.",
  "Pós-parto: o assoalho pélvico também treina. Se sentir peso vaginal ou perda de urina durante um exercício, reduza a carga e avise sua professora.",
];

/* ============ STATE ============ */
let profile = null;
let progress = null; // {semanaAtual, semanas:{1:{A:{ex:{carga,feito},...,cardioFeito},B:{...},C:{...}}}}
let avaliacoes = []; // array of entries
let activeTab = 'treino';
let activeWorkout = 'A';
let viewingWeek = 1;

function emptyWeek(){
  const w = {};
  ['A','B','C'].forEach(k=>{
    w[k] = {cardioFeito:false, ex:{}};
    WORKOUTS[k].forEach(e=> w[k].ex[e.id] = {carga:'', feito:false});
  });
  w.evolucao = {};
  w.checkin = {};
  return w;
}
function ensureWeek(n){
  if(!progress.semanas[n]) progress.semanas[n] = emptyWeek();
  return progress.semanas[n];
}

/* ============ STORAGE ============ */
async function loadAll(){
  try{
    const p = await window.storage.get('perfil', true);
    profile = p ? JSON.parse(p.value) : {nome:'Rafaela', idade:'27 anos', altura:'1,68 m', rotina:'Pós-parto — uso contínuo de rivaroxabana e início de tirzepatida', objetivo:'Emagrecimento, condicionamento físico e introdução à musculação', videoAlongamento:''};
    if(profile.videoAlongamento===undefined) profile.videoAlongamento='';
  }catch(e){ profile = {nome:'Rafaela', idade:'27 anos', altura:'1,68 m', rotina:'Pós-parto — uso contínuo de rivaroxabana e início de tirzepatida', objetivo:'Emagrecimento, condicionamento físico e introdução à musculação', videoAlongamento:''}; }

  try{
    const pr = await window.storage.get('progresso', true);
    progress = pr ? JSON.parse(pr.value) : {semanaAtual:1, semanas:{}};
  }catch(e){ progress = {semanaAtual:1, semanas:{}}; }
  viewingWeek = progress.semanaAtual || 1;
  ensureWeek(viewingWeek);

  try{
    const av = await window.storage.get('avaliacoes', true);
    avaliacoes = av ? JSON.parse(av.value) : [];
  }catch(e){ avaliacoes = []; }
}
async function saveProfile(){ try{ await window.storage.set('perfil', JSON.stringify(profile), true); }catch(e){} }
async function saveProgress(){ try{ await window.storage.set('progresso', JSON.stringify(progress), true); }catch(e){} }
async function saveAvaliacoes(){ try{ await window.storage.set('avaliacoes', JSON.stringify(avaliacoes), true); }catch(e){} }

/* ============ RENDER HELPERS ============ */
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function todayTip(){ const idx = new Date().getDate() % TIPS.length; return TIPS[idx]; }

function renderTipBanner(text, icon){
  return `<div class="tip"><div class="icon">${icon||'✦'}</div><div class="body"><div class="label">Dica importante</div><p>${text}</p></div></div>`;
}

function weekRingSVG(current){
  const total = TOTAL_WEEKS;
  const r = 78, cx=93, cy=93, strokeW=13;
  let petals = '';
  for(let i=0;i<total;i++){
    const a0 = (i/total)*2*Math.PI - Math.PI/2;
    const a1 = ((i+0.86)/total)*2*Math.PI - Math.PI/2;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const wk = i+1;
    const filled = wk <= current;
    const color = filled ? (wk===current ? 'var(--rose)' : 'var(--gold)') : '#EFE3D6';
    petals += `<path class="petal" data-week="${wk}" d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)}"
      stroke="${color}" stroke-width="${strokeW}" fill="none" stroke-linecap="round"/>`;
  }
  return `<svg class="ring-svg" viewBox="0 0 186 186">${petals}
    <text x="93" y="90" text-anchor="middle" class="ring-center-num">${current}</text>
    <text x="93" y="110" text-anchor="middle" class="ring-center-label">de ${total} semanas</text>
  </svg>`;
}

/* ============ TAB: TREINO ============ */
function renderTreino(){
  const wk = ensureWeek(viewingWeek);
  const list = WORKOUTS[activeWorkout];
  const doneCount = list.filter(e=>wk[activeWorkout].ex[e.id].feito).length;
  const totalCount = list.length + 1; // + cardio
  const cardioDone = wk[activeWorkout].cardioFeito;
  const doneAll = doneCount + (cardioDone?1:0);

  let html = renderTipBanner(todayTip(), '✦');

  html += `<div class="card">
    <div class="ring-wrap">
      ${weekRingSVG(viewingWeek)}
    </div>
    <div class="week-scroll" id="weekScroll">
      ${Array.from({length:TOTAL_WEEKS},(_,i)=>i+1).map(n=>`
        <div class="week-chip ${n===viewingWeek?'active':''}" data-week="${n}">
          S${n}<span class="rpe">RPE ${rpeForWeek(n)}</span>
        </div>`).join('')}
    </div>
    <div class="progress-summary">
      <div class="psum"><div class="num">RPE ${rpeForWeek(viewingWeek)}</div><div class="lbl">meta da semana</div></div>
      <div class="psum"><div class="num">${doneAll}/${totalCount}</div><div class="lbl">feitos hoje</div></div>
    </div>
  </div>`;

  html += `<div class="card">
    <h2>Treino da semana ${viewingWeek}</h2>
    <p class="sub">Descanso de 75–90s entre séries · progrida a carga só quando a técnica estiver fácil.</p>
    <div class="subtabs">
      ${['A','B','C'].map(k=>`<div class="subtab ${k===activeWorkout?'active':''}" data-w="${k}">Treino ${k}</div>`).join('')}
    </div>
    <div id="exerciseList">
      ${list.map(e=>{
        const state = wk[activeWorkout].ex[e.id];
        return `<div class="exercise" data-ex="${e.id}">
          <div class="exercise-top">
            <div>
              <div class="exercise-name">${e.nome}</div>
              <div class="exercise-meta">${e.series} séries · ${e.reps} reps · ${e.foco}</div>
            </div>
            <div class="check-btn ${state.feito?'done':''}" data-toggle-ex="${e.id}">✓</div>
          </div>
          <div class="exercise-controls">
            <div class="field">
              <label>Carga (kg)</label>
              <input type="text" inputmode="decimal" placeholder="ex: 20" value="${state.carga}" data-carga="${e.id}">
            </div>
          </div>
        </div>`;
      }).join('')}
      <div class="cardio-row">
        <div>
          <div class="l">Bicicleta — condicionamento</div>
          <div class="r">${CARDIO.tempo} · ${CARDIO.zona}</div>
        </div>
        <div class="check-btn ${cardioDone?'done':''}" id="cardioToggle">✓</div>
      </div>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;

  // bind week chips
  document.querySelectorAll('.week-chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{ viewingWeek = parseInt(chip.dataset.week); ensureWeek(viewingWeek); renderTreino(); });
  });
  document.querySelectorAll('.petal').forEach(p=>{
    p.addEventListener('click', ()=>{ viewingWeek = parseInt(p.dataset.week); ensureWeek(viewingWeek); renderTreino(); });
  });
  document.querySelectorAll('.subtab').forEach(t=>{
    t.addEventListener('click', ()=>{ activeWorkout = t.dataset.w; renderTreino(); });
  });
  document.querySelectorAll('[data-toggle-ex]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.toggleEx;
      const st = wk[activeWorkout].ex[id];
      st.feito = !st.feito;
      if(progress.semanaAtual < viewingWeek) progress.semanaAtual = viewingWeek;
      saveProgress();
      renderTreino();
    });
  });
  document.querySelectorAll('[data-carga]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      wk[activeWorkout].ex[inp.dataset.carga].carga = inp.value;
    });
    inp.addEventListener('blur', saveProgress);
  });
  const cardioBtn = document.getElementById('cardioToggle');
  if(cardioBtn) cardioBtn.addEventListener('click', ()=>{
    wk[activeWorkout].cardioFeito = !wk[activeWorkout].cardioFeito;
    if(progress.semanaAtual < viewingWeek) progress.semanaAtual = viewingWeek;
    saveProgress();
    renderTreino();
  });

  setTimeout(()=>{
    const scroller = document.getElementById('weekScroll');
    const active = scroller && scroller.querySelector('.active');
    if(active) active.scrollIntoView({inline:'center', behavior:'instant'});
  },0);
}

/* ============ TAB: GUIA ============ */
function renderGuia(){
  let html = renderTipBanner('Consulte aqui a forma correta de cada exercício antes de aumentar a carga. Técnica sempre em primeiro lugar.', '📖');
  html += `<div class="search-box">
    <span>🔎</span>
    <input type="text" id="guiaSearch" placeholder="Buscar exercício...">
  </div>
  <div class="card" id="guiaCard"></div>`;
  document.getElementById('main').innerHTML = html;
  const list = document.getElementById('guiaCard');
  function draw(filter){
    const f = (filter||'').toLowerCase();
    const items = GUIA.filter(g=>g.nome.toLowerCase().includes(f));
    list.innerHTML = items.length ? items.map(g=>`
      <div class="guia-item">
        <h3>${g.nome}</h3>
        <div class="guia-row"><span class="guia-tag tag-como">Como fazer</span><p>${g.como}</p></div>
        <div class="guia-row"><span class="guia-tag tag-erro">Erro comum</span><p>${g.erro}</p></div>
        <div class="guia-row"><span class="guia-tag tag-dica">Dica</span><p>${g.dica}</p></div>
      </div>`).join('') : `<div class="empty">Nenhum exercício encontrado.</div>`;
  }
  draw('');
  document.getElementById('guiaSearch').addEventListener('input', (e)=>draw(e.target.value));
}

/* ============ TAB: BEM-ESTAR ============ */
function renderBemEstar(){
  const link = profile.videoAlongamento || '';
  let html = `<div class="card">
    <h2>Alongamento guiado</h2>
    <p class="sub">10 minutos · vídeo enviado pelo Drive.</p>
    ${link ? `<a href="${link}" target="_blank" style="text-decoration:none;"><button class="btn btn-primary" type="button" style="margin-top:2px;">▶ Abrir vídeo do alongamento</button></a>`
           : `<div class="empty" style="padding:16px 4px;">Link do vídeo ainda não adicionado.</div>`}
    <div class="field-full" style="margin-top:14px;">
      <label>Link do vídeo (Drive)</label>
      <input type="text" id="videoLink" placeholder="Cole aqui o link do Drive" value="${link}">
    </div>
    <button class="btn btn-primary" id="saveVideoLink">Salvar link</button>
    <div class="save-note" id="videoLinkNote"></div>
  </div>`;

  html += `<div class="card">
    <h2>Hábitos diários</h2>
    <p class="sub">Sugestões para incluir na rotina, no seu ritmo.</p>
    ${HABITOS.map(h=>`<div class="list-item"><span class="name">${h.nome}</span><span class="time">${h.tempo}</span></div>`).join('')}
  </div>`;

  html += `<div class="card">
    <h2>Momento em família</h2>
    <p class="sub">Movimento leve para fazer junto com o bebê.</p>
    ${FAMILIA.map(m=>`<div class="list-item"><span class="name">${m.nome}</span><span class="time">${m.tempo}</span></div>`).join('')}
  </div>`;

  document.getElementById('main').innerHTML = html;
  document.getElementById('saveVideoLink').addEventListener('click', async ()=>{
    profile.videoAlongamento = document.getElementById('videoLink').value.trim();
    await saveProfile();
    const n = document.getElementById('videoLinkNote');
    n.textContent = 'Link salvo ✓'; n.classList.add('show');
    setTimeout(()=>{ n.classList.remove('show'); n.textContent=''; },2000);
    renderBemEstar();
  });
}

/* ============ TAB: AVALIAÇÃO ============ */
function renderAvaliacao(){
  const wk = ensureWeek(viewingWeek);
  let html = '';

  html += `<div class="card">
    <h2>Evolução física</h2>
    <p class="sub">Dê uma nota de 1 a 5 para como você está se sentindo esta semana.</p>
    ${RATING_ITEMS.map(r=>{
      const val = wk.evolucao[r.id] || 0;
      return `<div class="rating-row">
        <span class="rlabel">${r.label}</span>
        <div class="stars" data-rating="${r.id}">
          ${[1,2,3,4,5].map(n=>`<div class="star ${n<=val?'active':''}" data-val="${n}">${n}</div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  html += `<div class="card">
    <h2>Check-in semanal</h2>
    <p class="sub">Responda em poucas palavras — sua professora lê tudo por aqui.</p>
    ${CHECKIN_QUESTIONS.map(q=>{
      const val = wk.checkin[q.id] || '';
      return `<div class="qa"><label>${q.label}</label><textarea data-checkin="${q.id}" rows="1">${val}</textarea></div>`;
    }).join('')}
    <button class="btn btn-primary" id="saveCheckin">Salvar check-in</button>
    <div class="save-note" id="checkinNote"></div>
  </div>`;

  document.getElementById('main').innerHTML = html;

  document.querySelectorAll('[data-rating]').forEach(group=>{
    group.querySelectorAll('.star').forEach(star=>{
      star.addEventListener('click', ()=>{
        wk.evolucao[group.dataset.rating] = parseInt(star.dataset.val);
        saveProgress();
        renderAvaliacao();
      });
    });
  });

  document.querySelectorAll('[data-checkin]').forEach(ta=>{
    ta.addEventListener('input', ()=>{ wk.checkin[ta.dataset.checkin] = ta.value; });
  });
  document.getElementById('saveCheckin').addEventListener('click', async ()=>{
    await saveProgress();
    const n = document.getElementById('checkinNote');
    n.textContent = 'Check-in salvo ✓'; n.classList.add('show');
    setTimeout(()=>{ n.classList.remove('show'); n.textContent=''; },2200);
  });
}

/* ============ TAB: PERFIL ============ */
function renderPerfil(){
  const initials = (profile.nome||'?').trim().charAt(0).toUpperCase();
  let html = `<div class="card">
    <div class="profile-avatar">${initials}</div>
    <div class="field-full"><label>Nome</label><div style="padding:10px 11px;background:#FBF8F3;border-radius:10px;font-size:14px;">${profile.nome||'—'}</div></div>
    <div class="field-full"><label>Idade</label><div style="padding:10px 11px;background:#FBF8F3;border-radius:10px;font-size:14px;">${profile.idade||'—'}</div></div>
    <div class="field-full"><label>Altura</label><div style="padding:10px 11px;background:#FBF8F3;border-radius:10px;font-size:14px;">${profile.altura||'—'}</div></div>
    <div class="field-full"><label>Rotina / condição de saúde</label><div style="padding:10px 11px;background:#FBF8F3;border-radius:10px;font-size:14px;line-height:1.5;">${profile.rotina||'—'}</div></div>
    <div class="field-full"><label>Objetivo</label><div style="padding:10px 11px;background:#FBF8F3;border-radius:10px;font-size:14px;line-height:1.5;">${profile.objetivo||'—'}</div></div>
  </div>`;
  document.getElementById('main').innerHTML = html;
}

/* ============ TAB ROUTER ============ */
function renderTab(){
  document.querySelectorAll('.navbtn').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  document.getElementById('weekPill').textContent = `Semana ${viewingWeek}/${TOTAL_WEEKS}`;
  if(activeTab==='treino') renderTreino();
  else if(activeTab==='guia') renderGuia();
  else if(activeTab==='bemestar') renderBemEstar();
  else if(activeTab==='avaliacao') renderAvaliacao();
  else if(activeTab==='perfil') renderPerfil();
}

document.querySelectorAll('.navbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    activeTab = btn.dataset.tab;
    renderTab();
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0,0);
  });
});

/* ============ INIT ============ */
(async function init(){
  await loadAll();
  document.getElementById('brandName').textContent = profile.nome || 'Aluna';
  renderTab();
})();
</script>
